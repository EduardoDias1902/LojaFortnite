<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Fortnite | Hoje</title>
    <!-- Modern fonts for a premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Confira os cosméticos e pacotes da Loja de Itens do Fortnite de hoje.">
</head>
<body>
    <header class="hero-header">
        <div class="header-content">
            <h1 class="glow-text">LOJA DO FORTNITE 77</h1>
            <p id="date-display">Buscando informações cósmicas...</p>
            <div id="countdown-container" class="countdown-container">
                <span id="countdown-label">Nova loja em:</span>
                <span id="countdown-timer">00:00:00</span>
            </div>
        </div>
    </header>

    <main>
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Carregando cosméticos...</p>
        </div>
        
        <section id="shop-container" class="shop-grid">
            <!-- Items injected by JS -->
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
