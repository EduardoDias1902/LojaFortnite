<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Fortnite | Hoje</title>
    <!-- Modern fonts for a premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Confira os cosméticos e pacotes da Loja de Itens do Fortnite de hoje.">
</head>
<body>
    <header class="hero-header">
        <div class="header-content">
            <h1 class="glow-text">LOJA DO FORTNITE 77</h1>
            <p id="date-display">Buscando informações cósmicas...</p>
            <div id="countdown-container" class="countdown-container">
                <span id="countdown-label">Nova loja em:</span>
                <span id="countdown-timer">00:00:00</span>
            </div>
        </div>
    </header>

    <main>
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Carregando cosméticos...</p>
        </div>
        
        <section id="shop-container" class="shop-grid">
            <!-- Items injected by JS -->
        </section>

        <section id="item-detail-view" class="detail-view hidden">
            <button id="btn-back" class="btn-back">⬅ VOLTAR</button>
            <div class="detail-content">
                <div class="detail-image-container">
                    <img id="detail-image" src="" alt="Item Image">
                </div>
                <div class="detail-info">
                    <span id="detail-type" class="detail-type">TIPO</span>
                    <h2 id="detail-name" class="detail-name">NOME</h2>
                    <p id="detail-description" class="detail-description">Descrição</p>
                    <p id="detail-set" class="detail-set"></p>
                    <div class="detail-price-container">
                        <img id="detail-vbuck" src="" alt="V-Bucks" class="vbucks-icon">
                        <span id="detail-price">2000</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
